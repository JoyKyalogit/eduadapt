# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect this repo.
# First deploy: set GROQ_API_KEY when Render prompts (sync: false).

databases:
  - name: eduadapt-db
    plan: free
    databaseName: eduadapt
    user: eduadapt

services:
  - type: web
    name: eduadapt-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: eduadapt-db
          property: connectionString
